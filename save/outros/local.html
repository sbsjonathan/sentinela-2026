<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Limpar Cache</title>
    <meta name="theme-color" content="#f5f5f5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Estudo">
    <meta name="application-name" content="Estudo">
    <link rel="manifest" href="../../manifest.json">
    <link rel="apple-touch-icon" href="../../icons/apple-touch-icon.png">
    <script src="../../pwa/app-mode.js" defer></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f5;
            padding: calc(20px + env(safe-area-inset-top)) calc(20px + env(safe-area-inset-right)) calc(20px + env(safe-area-inset-bottom)) calc(20px + env(safe-area-inset-left));
            text-align: center;
        }
        
        .container {
            max-width: 400px;
            margin: 50px auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        
        .info {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            font-size: 14px;
            color: #1976d2;
        }
        
        .button {
            background: #ff4444;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 10px;
            transition: background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        
        .button:active {
            background: #cc3333;
            transform: scale(0.98);
        }
        
        .button.success {
            background: #4caf50;
        }
        
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: 600;
        }
        
        .result.success {
            background: #e8f5e8;
            color: #2e7d32;
        }
        
        .cache-info {
            background: #fff3e0;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            font-size: 13px;
            color: #ef6c00;
            text-align: left;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #5B3C88;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧹 Limpar Cache</h1>
        
        <div class="info">
            <strong>📱 Para iPhone:</strong><br>
            Este botão vai limpar todo o localStorage da sua Bíblia, incluindo posições salvas e dados temporários.
        </div>
        
        <div class="cache-info">
            <strong>🔍 O que será limpo:</strong><br>
            • Posições de scroll salvas<br>
            • Última página visitada<br>
            • Dados temporários<br>
            • Cache de navegação<br>
            • Configurações locais
        </div>
        
        <button class="button" id="clearButton" onclick="clearAllCache()">
            🗑️ Limpar Todo o Cache
        </button>
        
        <div id="result"></div>
        
        <a href="index.html" class="back-link">← Voltar para Início</a>
    </div>

    <script>
        function clearAllCache() {
            const button = document.getElementById('clearButton');
            const result = document.getElementById('result');
            
            try {
                // Conta quantos itens existem antes
                const itemsBefore = localStorage.length;
                
                // Limpa TUDO do localStorage
                localStorage.clear();
                
                // Também força limpeza do cache do navegador (se possível)
                if ('caches' in window) {
                    caches.keys().then(names => {
                        names.forEach(name => {
                            caches.delete(name);
                        });
                    });
                }
                
                // Feedback visual
                button.textContent = '✅ Cache Limpo!';
                button.classList.add('success');
                
                result.innerHTML = `
                    <div class="result success">
                        <strong>✅ Sucesso!</strong><br>
                        ${itemsBefore} itens removidos do localStorage<br><br>
                        <strong>📱 Agora faça:</strong><br>
                        1. Feche completamente o Safari<br>
                        2. Reabra a página da Bíblia<br>
                        3. Teste os títulos novamente
                    </div>
                `;
                
                // Reset do botão após 3 segundos
                setTimeout(() => {
                    button.textContent = '🗑️ Limpar Todo o Cache';
                    button.classList.remove('success');
                }, 3000);
                
            } catch (error) {
                result.innerHTML = `
                    <div class="result" style="background: #ffebee; color: #c62828;">
                        <strong>❌ Erro:</strong><br>
                        ${error.message}
                    </div>
                `;
            }
        }
        
        // Mostra informações do cache atual
        window.addEventListener('load', () => {
            const itemCount = localStorage.length;
            const cacheInfo = document.querySelector('.cache-info');
            
            if (itemCount > 0) {
                cacheInfo.innerHTML += `<br><br><strong>📊 Atualmente:</strong> ${itemCount} itens no cache`;
            } else {
                cacheInfo.innerHTML += `<br><br><strong>📊 Cache:</strong> Limpo`;
            }
        });
    </script>
</body>
</html>
