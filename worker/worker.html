<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sentinela Extractor</title>
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Estudo">
    <meta name="application-name" content="Estudo">
    <link rel="manifest" href="../manifest.json">
    <link rel="apple-touch-icon" href="../icons/apple-touch-icon.png">
    <script src="../pwa/app-mode.js" defer></script>

  <link rel="stylesheet" href="worker.css">
</head>
<body>
  
  <div class="controls">
    <input type="month" id="monthInput" class="input-style" aria-label="Mês" />

    <select id="studyInput" class="input-style" aria-label="Estudo">
      <option value="01">01</option>
      <option value="02">02</option>
      <option value="03">03</option>
      <option value="04">04</option>
      <option value="05">05</option>
    </select>

    <button id="btnGo" aria-label="Extrair"></button>
    <button id="btnCopy" aria-label="Copiar"></button>

    <!-- quebra para segunda linha -->
    <div class="controls-break" aria-hidden="true"></div>

    <!-- novo botão 1 -->
<button id="btn1" aria-label="Botão 1">1</button>
<button id="btn2" aria-label="Botão 2">2</button>
<button id="btn3" aria-label="Botão 3">3</button>
<button id="btn4" aria-label="Botão 4">4</button>
<button id="btnBack" aria-label="Voltar">↩</button>
  </div>

  <div class="output-container">
    <div id="loadingSkeleton" class="skeleton-overlay">
      <div class="skeleton-line w-40"></div>
      <div class="skeleton-line w-100"></div>
      <div class="skeleton-line w-80"></div>
      <div class="skeleton-line w-100"></div>
      <div class="skeleton-line w-60"></div>
      <br>
      <div class="skeleton-line w-100"></div>
      <div class="skeleton-line w-80"></div>
      <div class="skeleton-line w-100"></div>
    </div>

    <textarea id="outputArea" placeholder="O texto do estudo aparecerá aqui..." spellcheck="false"></textarea>
  </div>

</div>

  <!-- ========= INICIO MODULO BOTAO 3 (HTML MODAL) ========= -->
  <div id="editorModal" class="editor-modal">
    <div class="editor-container">
      <div class="editor-toolbar">
        <button id="btnBold" aria-label="Negrito"><b>B</b></button>
        <button id="btnItalic" aria-label="Itálico"><i>I</i></button>
        <div style="flex: 1;"></div>
        <button id="btnSaveEditor">Salvar</button>
        <button id="btnCloseEditor">Cancelar</button>
      </div>
      <iframe id="editorIframe" class="editor-iframe"></iframe>
    </div>
  </div>
  <!-- ========= FIM MODULO BOTAO 3 (HTML MODAL) ========= -->

  <script src="worker.js"></script>
</body>
</html>
