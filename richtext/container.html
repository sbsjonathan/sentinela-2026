<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no">
  <title>d16 - Editor Modular</title>
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Estudo">
    <meta name="application-name" content="Estudo">
    <link rel="manifest" href="../manifest.json">
    <link rel="apple-touch-icon" href="../icons/apple-touch-icon.png">
    <script src="../pwa/app-mode.js" defer></script>


  <script>
    (function() {
      try {
        var size = localStorage.getItem('tamanho-fonte-global') || 16;
        var safeSize = Math.min(26, Math.max(16, parseInt(size, 10)));
        var scale = safeSize / 16;
        var root = document.documentElement;
        root.style.setProperty('--tamanho-fonte', safeSize + 'px');
        root.style.setProperty('--font-base-default', '16');
        root.style.setProperty('--font-base-global', safeSize + 'px');
        root.style.setProperty('--font-scale-global', scale);
        root.dataset.fontSizeGlobal = safeSize;

        var theme = localStorage.getItem('tema-interface') || 'system';
        var isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        root.setAttribute('data-theme', isDark ? 'dark' : 'light');
        root.dataset.themeChoice = theme;
      } catch(e) {}
    })();
  </script>

  <link rel="stylesheet" href="editor.css">
  <link rel="stylesheet" href="barra.css">
  <link rel="stylesheet" href="perf-low.css">
  <link rel="stylesheet" href="plugin/negrita.css">
  <link rel="stylesheet" href="plugin/bullet.css">
  <link rel="stylesheet" href="plugin/cores.css">
  <link rel="stylesheet" href="plugin/font.css">
  <link rel="stylesheet" href="plugin/leitor.css">
  <link rel="stylesheet" href="biblia/stylebbl.css">
  <link rel="stylesheet" href="../navbar/navbar-unified.css">
  <script>
    (function() {
      try {
        var perf = localStorage.getItem('editor-performance-mode') || 'low';
        var root = document.documentElement;
        root.dataset.performanceMode = perf;
        root.classList.toggle('perf-low', perf === 'low');
        root.classList.toggle('perf-normal', perf !== 'low');
        window.__EDITOR_PERF_BOOT__ = perf;
      } catch(e) {}
    })();
  </script>
</head>
<body class="with-bottom-navbar">
<nav class="bottom-navbar booting" data-context="navbar-context-notes">
    <a href="#" class="navbar-item" data-page="home" onclick="irParaHome(event)">
        <div class="navbar-icon icon-home"></div>
        <span class="navbar-label">Início</span>
    </a>
    <a href="#" class="navbar-item" data-page="bible" onclick="irParaBiblia(event)">
        <div class="navbar-icon icon-bible"></div>
        <span class="navbar-label">Bíblia</span>
    </a>
    <a href="#" class="navbar-item active" data-page="notes" onclick="irParaAnotacoes(event)">
        <div class="navbar-icon icon-notes"></div>
        <span class="navbar-label">Anotações</span>
    </a>
    <a href="#" class="navbar-item" data-page="watchtower" onclick="irParaSentinela(event)">
        <div class="navbar-icon icon-watchtower"></div>
        <span class="navbar-label">A Sentinela</span>
    </a>
    <a href="#" class="navbar-item" data-page="save" onclick="irParaSalvar(event)">
        <div class="navbar-icon icon-save"></div>
        <span class="navbar-label">Salvar</span>
    </a>
</nav>

    <div class="app">
        <div class="editor-scroll" id="editorScroll">
            <div class="page">
                <div class="editor" id="editor" contenteditable="true" spellcheck="false" autocapitalize="sentences"></div>
            </div>
        </div>

        <canvas class="glass-fx" id="glassFx" aria-hidden="true"></canvas>

        <div class="kbd-toolbar" id="kbdToolbar">
            <div class="pill-container">
                <div class="tool-slot tool-slot--undo">
                    <div class="tool-group">
                        <button class="tool-btn is-muted" type="button" aria-label="Desfazer">
                            <svg class="icon-fill" viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"></path></svg>
                        </button>
                        <button class="tool-btn is-muted" type="button" aria-label="Refazer">
                            <svg class="icon-fill" viewBox="0 0 24 24"><path d="M18.4 10.6C16.55 8.99 14.15 8 11.5 8c-4.65 0-8.58 3.03-9.96 7.22L3.9 16c1.05-3.19 4.05-5.5 7.6-5.5 1.95 0 3.73.72 5.12 1.88L13 16h9V7l-3.6 3.6z"></path></svg>
                        </button>
                    </div>
                </div>
                <div class="tool-slot tool-slot--type">
                    <div class="tool-group">
                        <button class="tool-btn" type="button" aria-label="Negrito">
                            <svg class="icon-fill" viewBox="0 0 24 24"><path d="M15.6 10.79c.97-.67 1.65-1.77 1.65-2.79 0-2.26-1.75-4-4-4H7v14h7.04c2.09 0 3.71-1.7 3.71-3.79 0-1.52-.86-2.82-2.15-3.42zM10 6.5h3c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5h-3v-3zm3.5 9H10v-3h3.5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5z"></path></svg>
                        </button>
                        <button class="tool-btn" type="button" aria-label="Itálico">
                            <svg class="icon-fill" viewBox="0 0 24 24"><path d="M10 4v3h2.21l-3.42 8H6v3h8v-3h-2.21l3.42-8H18V4z"></path></svg>
                        </button>
                    </div>
                </div>
                <div class="tool-slot tool-slot--combo">
                    <div class="tool-combo-wrap">
                        <div class="tool-subgroup">
                            <button class="tool-btn" type="button" aria-label="Lista">
                                <svg class="icon-fill" viewBox="0 0 24 24"><path d="M4 18h16v-2H4v2zm0-5h16v-2H4v2zm0-7v2h16V6H4z"/></svg>
                            </button>
                        </div>
                        <div class="tool-subgroup">
                            <button class="tool-btn" id="addToggleBtn" type="button" aria-label="Inserir Bloco de Toggle">
                                <svg class="icon-mix" viewBox="0 0 24 24"><polygon points="4,9 10,12 4,15" fill="currentColor" stroke-width="0"></polygon><line x1="12" y1="12" x2="20" y2="12"></line><line x1="12" y1="16" x2="17" y2="16"></line></svg>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="tool-slot tool-slot--font">
                    <div class="tool-group">
                        <button class="tool-btn font-btn" type="button" aria-label="Tamanho da Fonte">
                            <span class="font-label">Aa</span>
                            <svg class="font-arrow" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z" fill="currentColor"/></svg>
                        </button>
                    </div>
                </div>
                <div class="tool-slot tool-slot--colors">
                    <div class="tool-group">
                        <button class="tool-btn color-btn" type="button" aria-label="Cor do texto"><span class="color-indicator text">A</span></button>
                        <button class="tool-btn color-btn" type="button" aria-label="Cor de fundo"><span class="color-indicator bg">A</span></button>
                        <button class="tool-btn color-btn" type="button" aria-label="Resetar formatação"><span class="reset-indicator">A<svg class="reset-prohibition-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="#ff0000" stroke-width="2" opacity="0.8"/><line x1="6" y1="6" x2="18" y2="18" stroke="#ff0000" stroke-width="2" opacity="0.8"/></svg></span></button>
                    </div>
                </div>
                <div class="tool-slot tool-slot--book">
                    <div class="tool-group">
                        <button class="tool-btn" type="button" aria-label="Modo Bíblia">
                            <svg class="icon-stroke" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </div>

<div class="picker-overlay" id="color-picker-overlay">
            <div class="picker-sheet">
                <div class="picker-card">
                    <div class="picker-header">
                        <div style="width:24px"></div>
                        <div class="picker-title">Cores</div>
                        <div class="picker-close" id="picker-close">✕</div>
                    </div>
                    <div class="picker-tabs">
                        <div class="picker-tab active" data-target="picker-view-grid">Grade</div>
                        <div class="picker-tab" data-target="picker-view-spectrum">Espectro</div>
                        <div class="picker-tab" data-target="picker-view-controls">Controles</div>
                    </div>
                    <div class="picker-views">
                        <div id="picker-view-grid" class="picker-view active">
                            <div class="color-grid" id="picker-color-grid"></div>
                        </div>
                        <div id="picker-view-spectrum" class="picker-view">
                            <canvas id="picker-spec-canvas"></canvas>
                            <div class="picker-dot" id="picker-dot"></div>
                        </div>
                        <div id="picker-view-controls" class="picker-view">
                            <div class="slider-row">
                                <div class="slider-label">Vermelho</div>
                                <div class="slider-control">
                                    <div class="track-wrapper">
                                        <div class="track-bg" id="picker-bg-r"></div>
                                        <input type="range" id="picker-slider-r" min="0" max="255" value="255">
                                    </div>
                                    <input type="number" class="num-input" id="picker-num-r" min="0" max="255" value="255">
                                </div>
                            </div>
                            <div class="slider-row">
                                <div class="slider-label">Verde</div>
                                <div class="slider-control">
                                    <div class="track-wrapper">
                                        <div class="track-bg" id="picker-bg-g"></div>
                                        <input type="range" id="picker-slider-g" min="0" max="255" value="59">
                                    </div>
                                    <input type="number" class="num-input" id="picker-num-g" min="0" max="255" value="59">
                                </div>
                            </div>
                            <div class="slider-row">
                                <div class="slider-label">Azul</div>
                                <div class="slider-control">
                                    <div class="track-wrapper">
                                        <div class="track-bg" id="picker-bg-b"></div>
                                        <input type="range" id="picker-slider-b" min="0" max="255" value="48">
                                    </div>
                                    <input type="number" class="num-input" id="picker-num-b" min="0" max="255" value="48">
                                </div>
                            </div>
                            <div class="hex-row">
                                <span class="hex-label">Hex sRGB</span>
                                <input type="text" class="hex-input" id="picker-hex-input" maxlength="6" value="FF3B30">
                            </div>
                        </div>
                    </div>
                    <div class="picker-footer">
                        <div class="picker-preview" id="picker-preview"></div>
                        <div class="picker-swatches" id="picker-swatches"></div>
                    </div>
                </div>
            </div>
        </div>

  <script src="../save/supabase.js"></script>
  <script src="../save/unified-load.js"></script>

  <script src="../navbar/navbar-unified.js"></script>
</body>
</html>
