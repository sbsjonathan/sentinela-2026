<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#e9ebef" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#08080a" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Reunião de Domingo</title>
    <meta name="apple-mobile-web-app-title" content="Reunião">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="navbar/navbar-unified.css">
</head>
<body>
    <main class="deck" id="deck"></main>

    <div class="dock">
        <div class="head recolhido" id="head">
            <div class="meta-l">
                <div class="m-date" id="semana-display">Carregando…</div>
                <div class="m-sub">Reunião de Domingo · A Sentinela</div>
            </div>
            <div class="head-chev" aria-label="Calendário">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
            </div>
        </div>
        <nav class="rail colapsada" id="rail" aria-label="Semanas"></nav>
        <div class="actions">
            <button class="act act-primary" data-act="estudo" data-estado="baixar">
                <span class="act-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M7 18a4 4 0 0 1-.5-7.97 5.5 5.5 0 0 1 10.65-1.32A3.5 3.5 0 0 1 17.5 18"/><path d="M12 11.5v6"/><path d="M9.5 15l2.5 2.5 2.5-2.5"/></svg></span>
                <span class="act-label">Baixar</span>
            </button>
            <button class="act act-secondary" data-act="notas">
                <span class="act-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M16.5 4.5l3 3L8 19l-4 1 1-4Z"/><path d="M14.5 6.5l3 3"/></svg></span>
                <span>Anotações</span>
            </button>
        </div>
        <div class="dots" id="dots"></div>
    </div>

    <script src="navbar/navbar-unified.js"></script>
    <script src="main.js"></script>
</body>
</html>
